<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="r" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F44336"/>
      <stop offset="1" stop-color="#B71C1C"/>
    </linearGradient>
    <linearGradient id="w" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FAFAFA"/>
      <stop offset="1" stop-color="#D0D0D0"/>
    </linearGradient>
  </defs>
  <!-- Ball body -->
  <circle cx="32" cy="32" r="29" fill="url(#r)" stroke="#111" stroke-width="3"/>
  <!-- Lower half -->
  <path d="M 3 32 A 29 29 0 0 0 61 32 Z" fill="url(#w)" stroke="#111" stroke-width="3"/>
  <!-- Center band -->
  <rect x="3" y="29" width="58" height="6" fill="#111"/>
  <!-- Center button -->
  <circle cx="32" cy="32" r="10" fill="#FFFFFF" stroke="#111" stroke-width="3"/>
  <circle cx="32" cy="32" r="5.5" fill="#FFFFFF" stroke="#111" stroke-width="2"/>
  <!-- "30" text in the button -->
  <text x="32" y="36.5"
        text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="10"
        fill="#111">30</text>
</svg>
