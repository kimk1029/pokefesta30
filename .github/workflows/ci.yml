name: CI

# 모노레포 PR/푸시 검증.
# 웹 (Next.js, 루트) — lint + typecheck + build (Vercel 이 실제 배포는 자동).
# 서버 (Express, server/) — typecheck.
# 모바일 (Expo, mobile/) — typecheck (Android 빌드는 로컬/EAS 에서 처리).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'server/**'
      - 'mobile/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'next.config.mjs'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web — lint · typecheck · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install deps
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint -- --max-warnings 100

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        env:
          # 빌드 단계는 실제 DB 가 필요 없음 (prisma client 만 generate 됨).
          # 단, next build 가 환경변수 부재로 throw 하지 않도록 더미 값 주입.
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          DIRECT_URL: postgresql://user:pass@localhost:5432/db
          NEXTAUTH_SECRET: ci-dummy-secret
          NEXTAUTH_URL: http://localhost:3000
        run: npm run build

  server:
    name: Server — typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # server 의 postinstall 은 server/node_modules/@prisma/client 를 지워서
      # 항상 root 의 @prisma/client (../node_modules) 로 해소되게 만든다.
      # CI 에서도 그 토폴로지를 그대로 유지하려면 root 도 설치 + generate 가 필요.
      - name: Install root deps
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Prisma generate (writes to root/node_modules/@prisma/client)
        run: npx prisma generate

      - name: Install server deps
        working-directory: server
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Typecheck
        working-directory: server
        run: npm run typecheck

  mobile:
    name: Mobile — typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install deps
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck
