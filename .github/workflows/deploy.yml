name: Deploy Admin

# main 앱은 Vercel 이 자동 배포, 이 워크플로우는 Synology 의 admin 만 담당.
# admin/ 또는 공유 스키마가 바뀔 때만 돌게 path 필터링.

on:
  push:
    branches: [main]
    paths:
      - 'admin/**'
      - 'prisma/schema.prisma'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-admin
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH & deploy admin
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            cd /root/dev/pokefesta30
            git fetch origin main
            git reset --hard origin/main

            cd admin
            rm -rf .next

            npm ci
            npx prisma generate
            npm run build

            # 빌드 결과 검증
            test -f .next/BUILD_ID || { echo "::error::admin build did not produce .next/BUILD_ID"; exit 1; }

            pm2 restart pokefesta30-admin --update-env \
              || pm2 start npm --name pokefesta30-admin -- start
            pm2 save
