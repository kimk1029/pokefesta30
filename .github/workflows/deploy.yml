name: Migrate & Deploy Admin

# Vercel 이 main 앱을 자동 배포하므로 이 워크플로우는:
#  (1) Supabase 스키마 동기화 (prisma db push)
#  (2) Synology 의 admin 재빌드/재시작
# admin/**, prisma/schema.prisma 변경 시만 실행.

on:
  push:
    branches: [main]
    paths:
      - 'admin/**'
      - 'prisma/schema.prisma'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-admin
  cancel-in-progress: false

jobs:
  migrate:
    name: Sync Supabase schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install prisma
        run: npm ci --prefer-offline --no-audit --no-fund
      - name: Prisma db push (스키마 → Supabase)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npx prisma db push --accept-data-loss --skip-generate
      # --accept-data-loss: 컬럼 타입 변경 등 파괴적 변경 허용.
      # 운영 DB 에 컬럼 드랍 위험이 있으니 prisma migrate dev/deploy 로 옮기려면 별도 작업 필요.

  deploy-admin:
    name: Deploy admin to Synology
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - name: SSH & deploy admin
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            cd /root/dev/pokefesta30
            git fetch origin main
            git reset --hard origin/main

            cd admin
            rm -rf .next

            npm ci
            npx prisma generate
            npm run build

            test -f .next/BUILD_ID || { echo "::error::admin build did not produce .next/BUILD_ID"; exit 1; }

            pm2 restart pokefesta30-admin --update-env \
              || pm2 start npm --name pokefesta30-admin -- start
            pm2 save
